version: "3.9"

services:
  backend:
    build: ./backend
    container_name: btc-quant-backend
    network_mode: host
    volumes:
      - ./backend/app/infrastructure/database:/app/app/infrastructure/database
    env_file: ./backend/.env
    environment:
      - DB_PATH=/app/app/infrastructure/database/btc-quant.db
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: btc-quant-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
