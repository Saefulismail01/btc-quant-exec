version: '3.8'

services:
  # FastAPI Backend + Data Ingestion
  btc-quant-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btc-quant-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Mode & Safety (override .env values)
      - LIGHTER_EXECUTION_MODE=${LIGHTER_EXECUTION_MODE:-testnet}
      - LIGHTER_TRADING_ENABLED=${LIGHTER_TRADING_ENABLED:-false}
      - EXECUTION_GATEWAY=${EXECUTION_GATEWAY:-lighter}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Persist database
      - ./backend/app/infrastructure/database:/app/backend/app/infrastructure/database
      # Persist nonce state
      - ./backend/app/infrastructure:/app/backend/app/infrastructure

    restart: unless-stopped
    networks:
      - btc-quant-network

  # Signal Executor - 4H signal-based execution daemon with SL freeze & trailing SL
  signal-executor:
    build:
      context: .
      dockerfile: Dockerfile.signal
    container_name: btc-quant-signal-executor
    env_file:
      - .env
    environment:
      - LIGHTER_EXECUTION_MODE=${LIGHTER_EXECUTION_MODE:-testnet}
      - LIGHTER_TRADING_ENABLED=true  # Override .env for signal executor
      - BACKEND_API_URL=http://btc-quant-api:8000/api/signal
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./execution_layer/lighter:/app/execution_layer/lighter
      - ./backend/app/infrastructure:/app/backend/app/infrastructure
      - ./logs:/app/logs
    depends_on:
      - btc-quant-api
    restart: unless-stopped
    networks:
      - btc-quant-network
    command: python execution_layer/lighter/signal_executor.py

  # Intraday Monitor - 15m position monitoring for trailing SL & early exit
  intraday-monitor:
    build:
      context: .
      dockerfile: Dockerfile.signal
    container_name: btc-quant-intraday-monitor
    env_file:
      - .env
    environment:
      - LIGHTER_EXECUTION_MODE=${LIGHTER_EXECUTION_MODE:-testnet}
      - LIGHTER_TRADING_ENABLED=${LIGHTER_TRADING_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./execution_layer/lighter:/app/execution_layer/lighter
      - ./backend/app/infrastructure:/app/backend/app/infrastructure
      - ./logs:/app/logs
    depends_on:
      - btc-quant-api
    restart: unless-stopped
    networks:
      - btc-quant-network
    command: python execution_layer/lighter/intraday_monitor.py

  # Paper Pullback Executor - Forward test pullback 0.30% + freeze rule (virtual money)
  paper-pullback:
    build:
      context: .
      dockerfile: Dockerfile.signal
    container_name: btc-quant-paper-pullback
    env_file:
      - .env
    environment:
      - PB_PCT=${PB_PCT:-0.003}
      - PB_WAIT=${PB_WAIT:-2}
      - PB_CYCLE=${PB_CYCLE:-60}
      - PB_NOTIONAL=${PB_NOTIONAL:-15000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend/app/infrastructure:/app/backend/app/infrastructure
      - ./logs:/app/logs
      # Persist trades CSV dan state JSON di luar container
      - ./data/paper_pullback:/app/data/paper_pullback
    depends_on:
      - btc-quant-api
    restart: unless-stopped
    networks:
      - btc-quant-network
    command: python paper_executor_pullback.py

  # Lighter Executor - Main execution daemon
  # DISABLED: Using API-only execution
  # lighter-executor:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.lighter
  #   container_name: btc-quant-lighter-executor
  #   env_file:
  #     - .env
  #   environment:
  #     - LIGHTER_EXECUTION_MODE=${LIGHTER_EXECUTION_MODE:-testnet}
  #     - LIGHTER_TRADING_ENABLED=${LIGHTER_TRADING_ENABLED:-false}
  #     - LOG_LEVEL=${LOG_LEVEL:-INFO}
  #   volumes:
  #     - ./backend/app/infrastructure:/app/backend/app/infrastructure
  #     - ./logs:/app/logs
  #   depends_on:
  #     - btc-quant-api
  #   restart: unless-stopped
  #   networks:
  #     - btc-quant-network

networks:
  btc-quant-network:
    driver: bridge

volumes:
  database:
    driver: local
